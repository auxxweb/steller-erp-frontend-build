# Builds with Vite and commits docs/ to main.
# GitHub Pages → Settings → Build and deployment → Deploy from branch → main → /docs

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure build environment
        run: |
          API="${{ secrets.VITE_API_BASE_URL }}"
          if [ -z "$API" ]; then
            API="${{ vars.VITE_API_BASE_URL }}"
          fi
          if [ -z "$API" ]; then
            API="https://server.stelleronline.com/api/v1"
          fi
          echo "VITE_API_BASE_URL=$API" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=/steller-erp-frontend-build/" >> "$GITHUB_ENV"
          echo "Using API: $API"

      - name: Build for GitHub Pages
        run: npm run build:pages

      - name: Publish dist to docs/
        run: node scripts/publish-to-docs.mjs

      - name: Sanity-check docs output
        run: |
          test -f docs/index.html
          test -f docs/404.html
          test -f docs/.nojekyll
          ! grep -q '/src/main.jsx' docs/index.html
          grep -q '/assets/' docs/index.html
          echo "docs/index.html is a bundled production build."

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes in docs/ — skip commit."
            exit 0
          fi
          git commit -m "Deploy production build to docs/ [skip ci]"
          git push
